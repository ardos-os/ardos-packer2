name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Stage 1: Build stdenv first to warm the Nix store cache.
  # All subsequent jobs depend on this, so they find stdenv in Cachix
  # instead of rebuilding it from scratch.
  stdenv:
    name: stdenv (${{ matrix.build.arch }} -> ${{ matrix.target_triple }})
    runs-on: ${{ matrix.build.runner }}
    strategy:
      fail-fast: false
      matrix:
        build:
          -             runner: blacksmith-16vcpu-ubuntu-2404
            arch: x86_64
            extra_platforms: x86_64-linux aarch64-linux riscv64-linux
          -             runner: blacksmith-16vcpu-ubuntu-2404-arm
            arch: aarch64
            extra_platforms: aarch64-linux x86_64-linux riscv64-linux
        target_triple:
          - x86_64
          - aarch64
          - riscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = https://ardos-os.cachix.org
            extra-trusted-public-keys = ardos-os.cachix.org-1:ER39Zub8rFCCCdjZ7VUG+654TvPFkH8fvk2Iofzt74s=
            experimental-features = nix-command flakes
            extra-platforms = ${{ matrix.build.extra_platforms }}

      - name: Push build outputs to Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ardos-os
          authToken: '${{ secrets.CACHIX_TOKEN }}'

      - name: Build stdenv
        run: |
          nix develop --command just build pkg stdenv ${{ matrix.build.arch }} ${{ matrix.target_triple }}

  # Stage 2: Build remaining packages (stdenv is already cached).
  packages:
    name: Build ${{ matrix.package }} (${{ matrix.build.arch }} -> ${{ matrix.target_triple }})
    needs: stdenv
    runs-on: ${{ matrix.build.runner }}
    strategy:
      fail-fast: false
      matrix:
        build:
          -             runner: blacksmith-8vcpu-ubuntu-2404
            arch: x86_64
            extra_platforms: x86_64-linux aarch64-linux riscv64-linux
          -             runner: blacksmith-8vcpu-ubuntu-2404-arm
            arch: aarch64
            extra_platforms: aarch64-linux x86_64-linux riscv64-linux
        target_triple:
          - x86_64
          - aarch64
          - riscv64
        package:
          - hellolibrary
          - hello
          - ardos-rom
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = https://ardos-os.cachix.org
            extra-trusted-public-keys = ardos-os.cachix.org-1:ER39Zub8rFCCCdjZ7VUG+654TvPFkH8fvk2Iofzt74s=
            experimental-features = nix-command flakes
            extra-platforms = ${{ matrix.build.extra_platforms }}

      - name: Push build outputs to Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ardos-os
          authToken: '${{ secrets.CACHIX_TOKEN }}'

      - name: Build package
        run: |
          nix develop --command just build pkg ${{ matrix.package }} ${{ matrix.build.arch }} ${{ matrix.target_triple }}

  # Stage 3: Run checks (packages are already cached).
  checks:
    name: Check `${{ matrix.test_name[0] }} ${{ matrix.test_name[1] }}` (${{ matrix.target_triple }})
    needs: packages
    runs-on: blacksmith-8vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        test_name:
          - [ unit hello-binary ]
          - [ integration hello ]
          - [ e2e minimal ]
          - [ e2e nss-plugins ]
          - [ e2e toolchain-config ]
          - [ e2e combined ]
        target_triple:
          - x86_64
          - aarch64
          - riscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = https://ardos-os.cachix.org
            extra-trusted-public-keys = ardos-os.cachix.org-1:ER39Zub8rFCCCdjZ7VUG+654TvPFkH8fvk2Iofzt74s=
            experimental-features = nix-command flakes
            extra-platforms = x86_64-linux aarch64-linux riscv64-linux

      - name: Push build outputs to Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ardos-os
          authToken: '${{ secrets.CACHIX_TOKEN }}'

      - name: Run ${{ matrix.test_name[0] }} ${{ matrix.test_name[1] }} test
        run: |
          nix develop --command just test ${{ matrix.test_name[0] }} ${{ matrix.test_name[1] }}
