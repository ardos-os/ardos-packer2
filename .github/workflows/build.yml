name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  hello-binary:
    name: Check hello binary (x86_64-linux-ardos)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = https://ardos-os.cachix.org
            extra-trusted-public-keys = ardos-os.cachix.org-1:ER39Zub8rFCCCdjZ7VUG+654TvPFkH8fvk2Iofzt74s=
            experimental-features = nix-command flakes
            extra-platforms = x86_64-linux aarch64-linux
      - name: Build hello-binary check
        run: nix build .#checks.hello-binary --print-build-logs
